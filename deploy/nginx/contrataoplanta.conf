# =============================================================================
# nginx — contrata o planta .cl
# Dominio principal: contrataoplanta.cl  → archivos estáticos
# Subdominio API:    api.contrataoplanta.cl → FastAPI en localhost:8000
# =============================================================================

# Redirige www → sin www
server {
    listen 80;
    server_name www.DOMAIN;
    return 301 https://DOMAIN$request_uri;
}

# Frontend estático
server {
    listen 80;
    server_name DOMAIN;

    root APP_DIR;
    index web/index.html;

    # Canonical home + legacy pages (evita duplicidad SEO)
    location = / {
        return 301 /web/index.html;
    }

    location = /index.html {
        return 301 /web/index.html;
    }

    location = /index_contrataoplanta.html {
        return 301 /web/index.html;
    }

    location = /instituciones.html {
        return 301 /web/instituciones.html;
    }

    location = /estadisticas.html {
        return 301 /web/estadisticas.html;
    }

    location = /favoritos.html {
        return 301 /web/favoritos.html;
    }

    location = /faq.html {
        return 301 /web/faq.html;
    }

    location = /terminos.html {
        return 301 /web/terminos.html;
    }

    location = /privacidad.html {
        return 301 /web/privacidad.html;
    }

    location = /descargo.html {
        return 301 /web/descargo.html;
    }

    # Archivos estáticos con caché moderado
    location ~* \.(html|css|js|json|xml|txt)$ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri $uri/ =404;
    }

    # Fuentes y assets (caché larga)
    location ~* \.(woff2?|ttf|eot|svg|png|jpg|webp|ico)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Seguridad básica
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Certbot renovación SSL
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}

# API FastAPI
server {
    listen 80;
    server_name API_DOMAIN;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # CORS preflight rápido en nginx (la API también lo maneja)
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            return 204;
        }
    }

    # Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}
