name: web-quality

on:
  push:
    paths:
      - 'web/**'
      - 'scripts/qa/**'
      - 'tests/test_web_smoke_nav.py'
      - '.github/workflows/web-quality.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'scripts/qa/**'
      - 'tests/test_web_smoke_nav.py'
      - '.github/workflows/web-quality.yml'

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Title consistency
        run: python scripts/qa/check_titles.py
      - name: Internal links
        run: python scripts/qa/check_internal_links.py
      - name: Accessibility basics
        run: python scripts/qa/check_accessibility_basics.py

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest playwright
      - name: Install browser
        run: python -m playwright install chromium
      - name: Run smoke tests
        run: pytest -q tests/test_web_smoke_nav.py
