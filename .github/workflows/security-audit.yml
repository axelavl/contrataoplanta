name: security-audit

on:
  push:
    paths:
      - 'requirements.txt'
      - '.github/workflows/security-audit.yml'
  pull_request:
    paths:
      - 'requirements.txt'
      - '.github/workflows/security-audit.yml'
  schedule:
    # Lunes 09:00 UTC — auditoría semanal contra PyPI advisory DB.
    - cron: '0 9 * * 1'

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Run pip-audit (reporte, no bloqueante por ahora)
        # Reporta vulnerabilidades pero no falla el workflow.
        # Hay deuda de seguridad pendiente de upgrade mayor (aiohttp,
        # Pillow, fastapi/starlette, pdfplumber) que requiere su propia
        # PR con verificación de compatibilidad. Cuando esa deuda se
        # cierre, quitar `continue-on-error` y añadir `--strict`.
        continue-on-error: true
        run: pip-audit --requirement requirements.txt
